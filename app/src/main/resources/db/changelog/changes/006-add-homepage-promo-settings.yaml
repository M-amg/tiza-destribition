databaseChangeLog:
  - changeSet:
      id: 006-01-homepage-promo-enabled
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: HALT
        sqlCheck:
          expectedResult: 0
          sql: "SELECT COUNT(*) FROM store_settings WHERE setting_key = 'homepage.promo.enabled'"
      changes:
        - insert:
            tableName: store_settings
            columns:
              - column:
                  name: id
                  value: '70000000-0000-0000-0000-000000000001'
              - column:
                  name: setting_key
                  value: 'homepage.promo.enabled'
              - column:
                  name: value_type
                  value: 'BOOLEAN'
              - column:
                  name: value_text
                  value: 'true'
              - column:
                  name: description
                  value: 'Homepage promo section enabled'
              - column:
                  name: is_public
                  valueBoolean: true
              - column:
                  name: created_at
                  value: '2026-03-08T00:00:00Z'
              - column:
                  name: updated_at
