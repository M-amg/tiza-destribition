spring.application.name=tiza-app

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tiza}
spring.datasource.username=${DB_USERNAME:tiza}
spring.datasource.password=${DB_PASSWORD:tiza}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

app.security.jwt.secret=${JWT_SECRET_BASE64:WmFwWWhjd0U4Q1JYd2hLMVhMNGhUdzJYblZLS0Q4OFBMTWdCdjNCTHFxQzVTRGg5}
app.security.jwt.access-token-ttl-minutes=${JWT_ACCESS_TTL_MINUTES:15}
app.security.jwt.refresh-token-ttl-days=${JWT_REFRESH_TTL_DAYS:14}
app.security.jwt.issuer=${JWT_ISSUER:tiza-app}

app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4200,http://127.0.0.1:4200,http://localhost:61009,http://127.0.0.1:61009/}
app.media.upload-dir=${APP_MEDIA_UPLOAD_DIR:uploads}

spring.servlet.multipart.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${APP_UPLOAD_MAX_REQUEST_SIZE:30MB}

# Sentry stays off until a DSN is provided and the integration is explicitly enabled.
sentry.enabled=${SENTRY_ENABLED:false}
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:${spring.application.name}-local}
sentry.release=${SENTRY_RELEASE:${spring.application.name}@dev}
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.1}
sentry.send-default-pii=${SENTRY_SEND_DEFAULT_PII:false}
sentry.logs.enabled=${SENTRY_LOGS_ENABLED:false}
sentry.profile-session-sample-rate=${SENTRY_PROFILE_SESSION_SAMPLE_RATE:0.0}
sentry.profile-lifecycle=${SENTRY_PROFILE_LIFECYCLE:TRACE}
