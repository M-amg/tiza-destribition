<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md p-8 border rounded-lg bg-card">
    <div class="flex flex-col items-center mb-8">
      <a routerLink="/" class="flex items-center gap-2 mb-4">
        <div class="h-8 w-8 rounded bg-primary"></div>
        <span class="text-2xl font-bold text-primary">Tiza Distribution</span>
      </a>
      <h1 class="text-2xl font-bold">{{ 'auth.forgotPassword.title' | t }}</h1>
      <p class="text-muted-foreground text-center mt-2">{{ 'auth.forgotPassword.subtitle' | t }}</p>
    </div>

    @if (message) {
      <p class="mb-4 rounded border border-green-200 bg-green-50 p-3 text-green-700">{{ message }}</p>
    }
    @if (errorMessage) {
      <p class="mb-4 rounded border border-red-200 bg-red-50 p-3 text-red-700">{{ errorMessage }}</p>
    }

    <form (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block mb-1">{{ 'checkout.emailAddress' | t }}</label>
        <input type="email" [(ngModel)]="email" name="email" required />
      </div>

      <button type="submit" class="w-full border rounded-md px-4 py-2 bg-primary text-white" [disabled]="loading">
        {{ loading ? ('auth.forgotPassword.sending' | t) : ('auth.forgotPassword.sendLink' | t) }}
      </button>
    </form>

    <div class="mt-6 text-center">
      <a routerLink="/login" class="inline-flex items-center text-sm text-primary hover:underline">{{ 'auth.register.signIn' | t }}</a>
    </div>
  </div>
</div>
