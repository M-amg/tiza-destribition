name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'admin/**'
      - 'website/**'
      - 'DEPLOY.md'
      - 'scripts/deploy-server.sh'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            admin/package-lock.json
            website/package-lock.json

      - name: Verify backend
        working-directory: app
        run: |
          chmod +x mvnw
          ./mvnw -B verify

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Build admin
        working-directory: admin
        run: npm run build

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_SERVER }}
      DEPLOY_USER:  ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: '22'
      DEPLOY_PATH: /var/www/tiza
      DEPLOY_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      DEPLOY_SSH_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
      API_SERVICE_NAME: ${{ vars.API_SERVICE_NAME || 'tiza-api' }}
      WEBSITE_SERVICE_NAME: ${{ vars.WEBSITE_SERVICE_NAME || 'tiza-web' }}
      API_DIR: /var/www/tiza/api
      ADMIN_PUBLIC_DIR: /var/www/tiza/admin
      WEBSITE_DIR: /var/www/tiza/web
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            admin/package-lock.json
            website/package-lock.json

      - name: Ensure deployment secrets are present
        run: |
          set -euo pipefail
          test -n "${DEPLOY_HOST}"
          test -n "${DEPLOY_USER}"
          if [ -z "${DEPLOY_SSH_KEY}" ] && [ -z "${DEPLOY_SSH_KEY_B64}" ]; then
            echo "Either SSH_PRIVATE_KEY or SSH_PRIVATE_KEY_B64 must be set."
            exit 1
          fi

      - name: Build backend
        working-directory: app
        run: |
          chmod +x mvnw
          ./mvnw -B -DskipTests package

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Build admin
        working-directory: admin
        run: npm run build

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Package backend artifact
        run: |
          set -euo pipefail
          JAR_PATH="$(find app/target -maxdepth 1 -name '*.jar' ! -name '*original*' | head -n 1)"
          test -n "${JAR_PATH}"
          cp "${JAR_PATH}" app.jar

      - name: Package admin build
        run: tar -C admin/dist/tiza-admin/browser -czf admin-build.tgz .

      - name: Package website build
        run: |
          set -euo pipefail
          rm -rf website-release
          mkdir -p website-release
          cp -R website/dist/website website-release/dist
          cp website/package.json website-release/package.json
          cp website/package-lock.json website-release/package-lock.json
          tar -C website-release -czf website-build.tgz .

      - name: Package deploy configs
        run: tar -C deploy -czf deploy-configs.tgz .

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          if [ -n "${DEPLOY_SSH_KEY_B64}" ]; then
            printf '%s' "${DEPLOY_SSH_KEY_B64}" | base64 -d > ~/.ssh/id_ed25519
          else
            printf '%s' "${DEPLOY_SSH_KEY}" | tr -d '\r' > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Upload bundle
        shell: bash
        run: |
          set -euo pipefail
          scp -P "${DEPLOY_PORT:-22}" app.jar "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/tiza-app.jar"
          scp -P "${DEPLOY_PORT:-22}" admin-build.tgz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/tiza-admin-build.tgz"
          scp -P "${DEPLOY_PORT:-22}" website-build.tgz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/tiza-website-build.tgz"
          scp -P "${DEPLOY_PORT:-22}" deploy-configs.tgz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/tiza-deploy-configs.tgz"
          scp -P "${DEPLOY_PORT:-22}" scripts/deploy-server.sh "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/tiza-deploy-server.sh"

      - name: Run remote deployment
        shell: bash
        run: |
          set -euo pipefail
          REMOTE_PATH="${DEPLOY_PATH:-/opt/tiza}"
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -euo pipefail
            mkdir -p '${REMOTE_PATH}'
            export DEPLOY_ROOT='${REMOTE_PATH}'
            export API_SERVICE_NAME='${API_SERVICE_NAME:-tiza-api}'
            export WEBSITE_SERVICE_NAME='${WEBSITE_SERVICE_NAME:-tiza-web}'
            export API_DIR='${API_DIR}'
            export ADMIN_PUBLIC_DIR='${ADMIN_PUBLIC_DIR}'
            export WEBSITE_DIR='${WEBSITE_DIR}'
            export DEPLOY_CONFIGS_TGZ='/tmp/tiza-deploy-configs.tgz'
            export ADMIN_BUILD_TGZ='/tmp/tiza-admin-build.tgz'
            export WEBSITE_BUILD_TGZ='/tmp/tiza-website-build.tgz'
            export API_JAR='/tmp/tiza-app.jar'
            bash /tmp/tiza-deploy-server.sh
            rm -f /tmp/tiza-app.jar /tmp/tiza-admin-build.tgz /tmp/tiza-website-build.tgz /tmp/tiza-deploy-configs.tgz /tmp/tiza-deploy-server.sh
          "
