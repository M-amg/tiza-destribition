openapi: 3.1.0
info:
  title: Tiza Distribution API
  version: 0.1.0
  description: Initial API contract for authentication and user identity.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Auth
    description: Authentication and account identity
paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new customer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation or duplicate email error
  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Authenticate with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Exchange refresh token for a new token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid refresh token
  /api/v1/auth/me:
    get:
      tags: [Auth]
      operationId: me
      summary: Get current authenticated user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Unauthorized
  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      summary: Request password reset token (always returns generic success)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "202":
          description: Request accepted
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required:
        - fullName
        - email
        - password
        - confirmPassword
        - customerType
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 120
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
        confirmPassword:
          type: string
          minLength: 8
          maxLength: 128
        customerType:
          $ref: "#/components/schemas/CustomerType"
        phone:
          type: string
          maxLength: 30
        companyName:
          type: string
          maxLength: 180
        taxId:
          type: string
          maxLength: 80
        address:
          type: string
          maxLength: 255
        city:
          type: string
          maxLength: 120
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    AuthResponse:
      type: object
      required: [accessToken, refreshToken, tokenType, expiresInSeconds, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresInSeconds:
          type: integer
          format: int64
        user:
          $ref: "#/components/schemas/AuthenticatedUser"
    MeResponse:
      allOf:
        - $ref: "#/components/schemas/AuthenticatedUser"
    AuthenticatedUser:
      type: object
      required: [id, email, fullName, customerType, status, roles]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullName:
          type: string
        customerType:
          $ref: "#/components/schemas/CustomerType"
        status:
          $ref: "#/components/schemas/UserStatus"
        roles:
          type: array
          items:
            type: string
    CustomerType:
      type: string
      enum: [B2C, B2B]
    UserStatus:
      type: string
      enum: [ACTIVE, INACTIVE, BLOCKED]
