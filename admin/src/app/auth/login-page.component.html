<section class="login-page">
  <article class="panel login-card">
    <div class="brand-row">
      <span class="brand-mark">TD</span>
      <div>
        <strong>Tiza Distribution</strong>
        <small>Admin Panel</small>
      </div>
    </div>

    <header>
      <h1>Sign In</h1>
      <p>Enter your admin credentials</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field-stack" for="login-email">
        <span>Email</span>
        <input id="login-email" type="email" formControlName="email" autocomplete="email" placeholder="admin@tizadistribution.com" />
      </label>

      <label class="field-stack" for="login-password">
        <span>Password</span>
        <input id="login-password" type="password" formControlName="password" autocomplete="current-password" placeholder="********" />
      </label>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" class="btn btn-primary login-btn" [disabled]="submitting">
        <lucide-icon [img]="iconLogin" [size]="16"></lucide-icon>
        {{ submitting ? 'Signing In...' : 'Sign In' }}
      </button>
    </form>
  </article>
</section>
